@if (data) {
<div class="card mb-3" style="min-height: 210px" (click)="abrirModalTimeline()">
  <div class="card-body d-flex flex-column">
    <div class="mt-3">
      <div class="d-flex justify-content-between align-items-start">
        <h6 class="card-title fw-bold mb-0">{{ data.titulo }}</h6>

        <div class="d-flex flex-column align-items-end">
          <span class="badge" [ngClass]="data.badgeClasseCor"
            >{{ data.badgeTexto }}</span
          >
        </div>
      </div>
      <p class="card-text small text-muted mt-4">{{ `${data.pedido.paciente?.nomeCompleto}` }}</p>
    </div>

    <div class="mt-auto d-flex justify-content-between align-items-center">
      <span class="badge" [ngClass]="data.prioridadeClasse">{{ data.prioridade }}</span>
      <small class="text-muted">{{ formatarDataHora(data.dataCriacao) }}</small>
    </div>
  </div>
</div>
}
