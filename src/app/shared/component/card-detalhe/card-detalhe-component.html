<div class="modal-header border-0">
  <h4 class="modal-title" id="modal-basic-title">
    <i class="bi bi-clock-history"></i> Histórico do Pedido
  </h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>

<div class="modal-body border-0">
  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <ng-container *ngIf="!loading">
    <!-- ================= TIMELINE ================= -->
    <app-timeline
      [fases]="fases"
      [faseAtual]="faseAtual"
      [podeAvancarFase]="podeAvancarFase()"
    >
    </app-timeline>

    <!-- ================= CHECKLIST SECTION ================= -->
    <app-checklist
      [checklist]="checklist"
      [titulo]="'Documentos Obrigatórios'"
      [mostrarProgresso]="true"
      [podeEditar]="true"
      [pedidoId]="pedido.id"
      [uploadProgress]="uploadProgress"
      (itemToggle)="toggleChecklistItem($event)"
      (checklistAtualizado)="checklist = $event"
      (arquivoSalvo)="onArquivoSalvo($event)"
    >
    </app-checklist>

    <!-- ================= CONTEÚDO DA FASE ================= -->

    <app-fase-criado
      *ngIf="faseAtual === 'CRIADO'"
      [pedido]="pedido"
      [checklist]="checklist"
      [podeAvancar]="podeAvancarFase()"
      [loading]="loading"
      (avancar)="enviarParaAnalise()"
      (visualizarChecklist)="isChecklistCollapsed = false"
    >
    </app-fase-criado>

    <app-fase-em-analise
      *ngIf="faseAtual === 'EM_ANALISE'"
      [pedido]="pedido"
      [checklist]="checklist"
      [podeAvancar]="podeAvancarFase()"
      [loading]="loading"
      (aprovar)="aprovarPedido()"
      (solicitarCorrecao)="solicitarCorrecao()"
    >
    </app-fase-em-analise>

    <app-fase-retorno
      *ngIf="pedido.status == 'APROVADO'"
      [pedido]="pedido"
      [checklist]="checklist"
      [podeAvancar]="podeAvancarFase()"
      [loading]="loading"
      (avancar)="avancarRetornoPedido()"
    >
    </app-fase-retorno>

    <app-fase-marcacao-cirurgia
      *ngIf="faseAtual === 'MARCACAO_CIRURGIA'"
      [pedido]="pedido"
      [checklist]="checklist"
      [podeAvancar]="podeAvancarFase()"
      [loading]="loading"
      (agendar)="agendarCirurgia($event)"
      (salvarRascunho)="salvarRascunhoCirurgia($event)"
    >
    </app-fase-marcacao-cirurgia>

    <app-fase-consulta-pre-operatoria
      *ngIf="faseAtual === 'CONSULTA_PRE_OPERATORIA'"
      [pedido]="pedido"
      [checklist]="checklist"
      [podeAvancar]="podeAvancarFase()"
      [loading]="loading"
      (agendar)="agendarConsultaPre($event)"
      (onToggleDocumento)="toggleChecklistItem($event)"
    >
    </app-fase-consulta-pre-operatoria>

    <!-- 🔹 FASE: FINALIZADO -->
    <div *ngIf="faseAtual === 'FINALIZADO'">
      <h5 class="fw-bold text-success">Pedido finalizado</h5>
      <app-pedidos-resumo [pedido]="pedido"></app-pedidos-resumo>
    </div>
  </ng-container>
</div>
